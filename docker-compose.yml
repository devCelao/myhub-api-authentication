networks:
  production:
    external: true
    name: production
  databases:
    external: true
    name: databases
  messaging:
    external: true
    name: messaging

services:
  api-authentication:
    build:
      context: ..
      dockerfile: myhub-api-authentication/AuthenticationAPI/Dockerfile
    container_name: api-authentication
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT:-Production}
      - Connection__ConnectionString=Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD}
      - Connection__Schema=${DB_SCHEMA:-SaaS}
      - MessageQueueConnection__MessageBus=host=rabbitmq;port=5672;username=${RABBITMQ_USER};password=${RABBITMQ_PASSWORD}
      - Jwt__Audience=${DOMAIN}
      - Jwks__Algorithm=${ALGORITHM}
      - Jwks__DaysUntilExpire=${DAYS_UNTIL_EXPIRE}
      - Jwks__KeysToKeep=${KEYS_TO_KEEP}
      - Jwks__KeyPrefix=${KEY_PREFIX}
    labels:
      - traefik.enable=true
      - traefik.http.routers.api-authentication.rule=Host(`api-authentication.${DOMAIN}`)
      - traefik.http.routers.api-authentication.entrypoints=web
      - traefik.http.services.api-authentication.loadbalancer.server.port=8080
    networks:
      - production
      - databases
      - messaging
